<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ampere SM Architecture</title>
<link rel="stylesheet" href="../viz-base.css">
<script src="../viz-base.js"></script>
<style>
  body { padding: 14px 24px; max-width: 1300px; margin: 0 auto; }
  h1 { font-size: 28px; line-height: 1.1; margin-bottom: 12px; }
  .diagram-wrap { max-width: 1040px; margin: 0 auto; }
  svg { display: block; width: 100%; height: auto; }

  .sm-shell { fill: #f8fafc; stroke: #334155; stroke-width: 3; rx: 14; }
  .sm-label-bg { fill: #334155; rx: 4; }
  .sm-label { fill: #fff; font-size: 13px; font-weight: 700; letter-spacing: .04em; }
  .ghost { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 3; stroke-dasharray: 8 6; rx: 14; }
  .ghost-label-bg { fill: #94a3b8; rx: 4; }
  .ghost-text { fill: #94a3b8; font-size: 22px; font-weight: 700; }

  .hw-node { cursor: pointer; }
  .node-box { stroke-width: 2; rx: 8; transition: stroke-width .18s; }
  .hw-node.selected .node-box { stroke-width: 4; filter: url(#selectedShadow); }
  .node-title { font-size: 16px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
  .node-sub { font-size: 12.5px; fill: #64748b; text-anchor: middle; dominant-baseline: middle; }

  .tc .node-box { fill: #dcfce7; stroke: #059669; }
  .tc .node-title { fill: #065f46; }
  .smem .node-box { fill: #ede9fe; stroke: #8b5cf6; }
  .smem .node-title { fill: #5b21b6; }
  .rf .node-box { fill: #fee2e2; stroke: #dc2626; }
  .rf .node-title { fill: #991b1b; }
  .ldst .node-box { fill: #dbeafe; stroke: #3b82f6; }
  .ldst .node-title { fill: #1e40af; }
  .cuda .node-box { fill: #f3f4f6; stroke: #6b7280; }
  .cuda .node-title { fill: #374151; }

  .gmem-box { fill: #f3f4f6; stroke: #6b7280; stroke-width: 2.5; rx: 10; }
  .gmem-title { fill: #374151; font-size: 16px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }

  .arrow { fill: none; stroke-width: 2.4; stroke-linejoin: round; stroke-linecap: round; }
  .arrow.blue { stroke: #3b82f6; marker-end: url(#arrowBlue); }
  .arrow.green { stroke: #059669; marker-end: url(#arrowGreen); }
  .arrow.red { stroke: #dc2626; marker-end: url(#arrowRed); }
  .arrow.store { stroke-dasharray: 7 5; opacity: .82; }
  .label-bg { fill: #f8fafc; stroke: rgba(148, 163, 184, .45); rx: 4; }
  .label-text { font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; font-weight: 700; dominant-baseline: middle; text-anchor: middle; }
  .blue-text { fill: #2563eb; }
  .green-text { fill: #047857; }
  .red-text { fill: #b91c1c; }

  .detail-panel {
    max-width: 1040px; margin: 10px auto 0;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); padding: 10px 16px;
    min-height: 110px; transition: border-color .3s;
  }
  .detail-panel .dp-title { font-size: 14.5px; font-weight: 700; margin-bottom: 3px; }
  .detail-panel .dp-body { font-size: 14px; line-height: 1.32; color: #475569; }
  .detail-panel .dp-body code {
    font-family: 'SF Mono','Fira Code',monospace; font-size: 12px;
    background: #f1f5f9; padding: 1px 5px; border-radius: 3px; color: #1e293b;
  }
  .detail-panel.empty .dp-body { color: #94a3b8; font-size: 16px; line-height: 1.3; }
</style>
</head>
<body>
  <h1>Ampere SM Architecture</h1>

  <div class="diagram-wrap">
    <svg viewBox="0 0 1040 470" role="img" aria-label="Ampere SM architecture data path">
      <defs>
        <filter id="selectedShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#000" flood-opacity=".22"/>
        </filter>
        <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="#3b82f6"/>
        </marker>
        <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="#059669"/>
        </marker>
        <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="#dc2626"/>
        </marker>
      </defs>

      <rect class="sm-shell" x="30" y="30" width="850" height="330"/>
      <rect class="sm-label-bg" x="54" y="18" width="210" height="22"/>
      <text class="sm-label" x="66" y="33">Streaming Multiprocessor (SM)</text>
      <rect class="ghost" x="900" y="30" width="90" height="330"/>
      <rect class="ghost-label-bg" x="912" y="18" width="58" height="22"/>
      <text class="sm-label" x="924" y="33">SM ...</text>
      <text class="ghost-text" x="945" y="203" text-anchor="middle">&times; N</text>

      <g class="hw-node tc" data-unit="tc" id="boxTC" transform="translate(80 70)">
        <rect class="node-box" width="230" height="62"/>
        <text class="node-title" x="115" y="24">Tensor Core (mma.sync)</text>
        <text class="node-sub" x="115" y="44">3rd-gen MMA</text>
      </g>
      <g class="hw-node cuda" data-unit="cuda" id="boxCUDA" transform="translate(620 70)">
        <rect class="node-box" width="210" height="62"/>
        <text class="node-title" x="105" y="24">CUDA Cores</text>
        <text class="node-sub" x="105" y="44">FP/INT units</text>
      </g>
      <g class="hw-node smem" data-unit="smem" id="boxSMEM" transform="translate(80 190)">
        <rect class="node-box" width="230" height="62"/>
        <text class="node-title" x="115" y="24">Shared Memory (SMEM)</text>
        <text class="node-sub" x="115" y="44">CTA staging</text>
      </g>
      <g class="hw-node rf" data-unit="rf" id="boxRF" transform="translate(600 190)">
        <rect class="node-box" width="230" height="62"/>
        <text class="node-title" x="115" y="24">Register File</text>
        <text class="node-sub" x="115" y="44">fragments + accumulators</text>
      </g>
      <g class="hw-node ldst" data-unit="ldst" id="boxLDST" transform="translate(80 290)">
        <rect class="node-box" width="230" height="62"/>
        <text class="node-title" x="115" y="24">LD/ST + cp.async</text>
        <text class="node-sub" x="115" y="44">thread-issued staging</text>
      </g>

      <rect class="gmem-box" x="30" y="390" width="960" height="54"/>
      <text class="gmem-title" x="510" y="417">Global Memory (GMEM)</text>

      <!-- Solid load / compute paths -->
      <path class="arrow blue" d="M 195 390 L 195 356"/>
      <path class="arrow blue" d="M 195 290 L 195 256"/>
      <path class="arrow green" d="M 310 221 L 596 221"/>
      <path class="arrow green" d="M 596 205 C 500 170, 405 155, 314 116"/>
      <path class="arrow red" d="M 314 88 C 445 58, 535 122, 596 190"/>

      <!-- Dashed epilogue / store path -->
      <path class="arrow red store" d="M 600 246 C 500 288, 410 288, 314 246"/>
      <path class="arrow blue store" d="M 225 256 L 225 286"/>
      <path class="arrow blue store" d="M 225 352 L 225 390"/>

      <g transform="translate(180 274)">
        <rect class="label-bg" x="-60" y="-10" width="120" height="20"/>
        <text class="label-text blue-text" x="0" y="1">cp.async / LD/ST</text>
      </g>
      <g transform="translate(453 207)">
        <rect class="label-bg" x="-39" y="-10" width="78" height="20"/>
        <text class="label-text green-text" x="0" y="1">ldmatrix</text>
      </g>
      <g transform="translate(458 153)">
        <rect class="label-bg" x="-42" y="-10" width="84" height="20"/>
        <text class="label-text green-text" x="0" y="1">mma.sync</text>
      </g>
      <g transform="translate(472 84)">
        <rect class="label-bg" x="-45" y="-10" width="90" height="20"/>
        <text class="label-text red-text" x="0" y="1">accumulate</text>
      </g>
      <g transform="translate(455 284)">
        <rect class="label-bg" x="-25" y="-10" width="50" height="20"/>
        <text class="label-text red-text" x="0" y="1">store</text>
      </g>
    </svg>
  </div>

  <div class="detail-panel empty" id="detailPanel">
    <div class="dp-title" id="dpTitle"></div>
    <div class="dp-body" id="dpBody">点击一个硬件单元查看说明。实线表示 load/compute path，虚线表示 store path。</div>
  </div>

<script>
(function() {
  var info = {
    ldst: {
      title: 'LD/ST + cp.async — thread-issued staging',
      color: '#3b82f6',
      body: 'Ampere 没有 <strong>TMA Engine</strong>。GMEM&rarr;SMEM staging 主要由 threads 发起的 load/store path 和 <code>cp.async</code> 驱动；address arithmetic、predication 和分阶段等待仍暴露给 kernel。'
    },
    tc: {
      title: 'Tensor Core (mma.sync) — warp-level MMA',
      color: '#059669',
      body: '读取分布在 warp 32 lanes 的 registers 中的 A/B fragments，并把 accumulator 写回 per-thread registers。operand fragments 通常由 <code>ldmatrix</code> 从 <strong>SMEM</strong> 生成。<br><code>mma.sync.aligned.m16n8k*</code>'
    },
    smem: {
      title: 'Shared Memory (SMEM) — CTA staging',
      color: '#8b5cf6',
      body: 'CTA 内 threads 共享的 on-chip scratchpad。Ampere Tensor Core operands 通常先被 staged 到 <strong>SMEM</strong>，再由 <code>ldmatrix</code> 生成 register fragments；swizzled layout 用来避免 bank conflicts。'
    },
    rf: {
      title: 'Register File',
      color: '#dc2626',
      body: 'per-thread private storage。Ampere 的 A/B fragments 和 MMA accumulators 都位于 registers；epilogue 使用普通 per-thread stores 写回 SMEM 或 GMEM，必要时先做本地重排。'
    },
    cuda: {
      title: 'CUDA Cores — Scalar FP/INT Units',
      color: '#6b7280',
      body: '通用 scalar compute units。处理 address arithmetic、loop control、predicate、epilogue math 和 data reformatting；操作的数据主要在 <strong>registers</strong> 中。'
    }
  };

  var panel = document.getElementById('detailPanel');
  var titleEl = document.getElementById('dpTitle');
  var bodyEl = document.getElementById('dpBody');
  var units = document.querySelectorAll('.hw-node');
  var activeUnit = null;

  units.forEach(function(el) {
    el.addEventListener('click', function() {
      var key = el.dataset.unit;
      if (key === activeUnit) { activeUnit = null; clearSelection(); return; }
      activeUnit = key;
      units.forEach(function(u) { u.classList.remove('selected'); });
      el.classList.add('selected');
      var d = info[key];
      panel.classList.remove('empty');
      panel.style.borderColor = d.color;
      titleEl.textContent = d.title;
      titleEl.style.color = d.color;
      bodyEl.innerHTML = d.body;
    });
  });

  function clearSelection() {
    units.forEach(function(u) { u.classList.remove('selected'); });
    panel.classList.add('empty');
    panel.style.borderColor = '';
    titleEl.textContent = '';
    bodyEl.innerHTML = '点击一个硬件单元查看说明。箭头展示 GEMM data path。';
  }
})();
</script>
</body>
</html>
